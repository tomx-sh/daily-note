name: After GitHub Pages deploy

on:
  deployment_status:

jobs:
  after-pages-deploy:
    if: >
      github.event.deployment_status.state == 'success' &&
      github.event.deployment.environment == 'github-pages'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out deployed commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment.sha }}
          fetch-depth: 0

      - name: Compute note metadata
        id: note
        run: |
          set -euo pipefail
          NOTE_NUMBER="$(git rev-list --count HEAD -- index.html)"
          echo "note_number=$NOTE_NUMBER" >> "$GITHUB_OUTPUT"
          echo "instapaper_url=https://tomx-sh.github.io/daily-note/?v=$NOTE_NUMBER" >> "$GITHUB_OUTPUT"
          echo "instapaper_title=Note quotidienne n°$NOTE_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Publish page to Instapaper
        env:
          INSTAPAPER_USERNAME: ${{ secrets.INSTAPAPER_USERNAME }}
          INSTAPAPER_PASSWORD: ${{ secrets.INSTAPAPER_PASSWORD }}
          INSTAPAPER_URL: ${{ steps.note.outputs.instapaper_url }}
          INSTAPAPER_TITLE: ${{ steps.note.outputs.instapaper_title }}
        run: |
          set -euo pipefail
          response_code="$(
            curl --silent --show-error --fail \
              --output /tmp/instapaper-response.json \
              --write-out '%{http_code}' \
              --user "$INSTAPAPER_USERNAME:$INSTAPAPER_PASSWORD" \
              --request POST https://www.instapaper.com/api/add \
              --data-urlencode "url=$INSTAPAPER_URL" \
              --data-urlencode "title=$INSTAPAPER_TITLE"
          )"
          test "$response_code" = "201"
          echo "Instapaper updated (HTTP $response_code)"
          cat /tmp/instapaper-response.json
